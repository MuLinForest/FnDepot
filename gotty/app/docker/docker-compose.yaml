services:
  gotty:
    image: mulin/gotty-tmux:latest
    container_name: gotty
    privileged: true
    pid: "host"
    restart: unless-stopped
    environment:
      TZ: ${wizard_tz:-Asia/Shanghai}
    volumes:
      - ${TRIM_APPDEST:-./gotty_data}:/var/sock
    ports:
      - "${wizard_gotty_port:-8080}:8080"
    command:
      - sh
      - -c
      - |
        socat UNIX-LISTEN:/var/sock/app.sock,fork TCP:127.0.0.1:8080 &
        exec gotty -w --path /app/gotty --ws-origin ".*" -c ${wizard_gotty_user:-admin}:${wizard_gotty_pass:-} tmux new -A -s main nsenter --target 1 --mount --uts --ipc --pid -- su - 1000
